name: Build npm packages

on:
  workflow_call:

jobs:
  package:
    name: npm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "{act,act-build}-*"
          merge-multiple: true

      - name: Set package versions
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "act-cli") | .version')
          find npm -name package.json -exec sed -i "s/\"0.0.0\"/\"$VERSION\"/g" {} +

      - name: Populate act-cli platform packages
        run: |
          cp artifacts/act-linux-x86_64-musl    npm/@actcore/act-cli-linux-x64/act
          cp artifacts/act-linux-aarch64-musl   npm/@actcore/act-cli-linux-arm64/act
          cp artifacts/act-linux-riscv64-musl   npm/@actcore/act-cli-linux-riscv64/act
          cp artifacts/act-macos-x86_64        npm/@actcore/act-cli-darwin-x64/act
          cp artifacts/act-macos-aarch64       npm/@actcore/act-cli-darwin-arm64/act
          cp artifacts/act-windows-x86_64.exe  npm/@actcore/act-cli-win32-x64/act.exe
          cp artifacts/act-windows-aarch64.exe npm/@actcore/act-cli-win32-arm64/act.exe

          chmod +x npm/@actcore/act-cli-linux-x64/act
          chmod +x npm/@actcore/act-cli-linux-arm64/act
          chmod +x npm/@actcore/act-cli-linux-riscv64/act
          chmod +x npm/@actcore/act-cli-darwin-x64/act
          chmod +x npm/@actcore/act-cli-darwin-arm64/act

      - name: Populate act-build platform packages
        run: |
          cp artifacts/act-build-linux-x86_64-musl    npm/@actcore/act-build-linux-x64/act-build
          cp artifacts/act-build-linux-aarch64-musl   npm/@actcore/act-build-linux-arm64/act-build
          cp artifacts/act-build-linux-riscv64-musl   npm/@actcore/act-build-linux-riscv64/act-build
          cp artifacts/act-build-macos-x86_64        npm/@actcore/act-build-darwin-x64/act-build
          cp artifacts/act-build-macos-aarch64       npm/@actcore/act-build-darwin-arm64/act-build
          cp artifacts/act-build-windows-x86_64.exe  npm/@actcore/act-build-win32-x64/act-build.exe
          cp artifacts/act-build-windows-aarch64.exe npm/@actcore/act-build-win32-arm64/act-build.exe

          chmod +x npm/@actcore/act-build-linux-x64/act-build
          chmod +x npm/@actcore/act-build-linux-arm64/act-build
          chmod +x npm/@actcore/act-build-linux-riscv64/act-build
          chmod +x npm/@actcore/act-build-darwin-x64/act-build
          chmod +x npm/@actcore/act-build-darwin-arm64/act-build

      - name: Add README to wrapper packages
        run: |
          cp README.md npm/@actcore/act/README.md
          cp README.md npm/@actcore/act-build/README.md

      - name: Pack all npm packages
        run: |
          mkdir -p packed
          for dir in npm/@actcore/*/; do
            (cd "$dir" && npm pack --pack-destination "$GITHUB_WORKSPACE/packed")
          done
      - uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: packed/*.tgz

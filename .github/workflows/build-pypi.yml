name: Build PyPI wheels

on:
  workflow_call:

jobs:
  linux:
    name: wheel (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: manylinux-x86_64
            target: x86_64
            manylinux: auto
          - name: manylinux-aarch64
            target: aarch64
            manylinux: auto
          - name: manylinux-riscv64
            target: riscv64gc-unknown-linux-gnu
            manylinux: auto
          - name: musllinux-x86_64
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_1
          - name: musllinux-aarch64
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_1
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --zig
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist

  macos:
    name: wheel (macos-${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}-apple-darwin
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: wheel (windows-${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x64
            maturin-target: ""
          - target: arm64
            maturin-target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.maturin-target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

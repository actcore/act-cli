name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  build-pypi:
    uses: ./.github/workflows/build-pypi.yml

  build-npm:
    needs: build
    uses: ./.github/workflows/build-npm.yml

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-cyclonedx
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx -f json --target all
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/*.cdx.json"

  release:
    name: GitHub Release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: act-*
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: sbom
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: artifacts/act-*
      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: artifacts/act-*
          sbom-path: sbom/act-cli/act-cli.cdx.json
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} artifacts/act-* sbom/**/*.cdx.json \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  pypi-publish:
    name: Publish to PyPI
    needs: build-pypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  npm-publish:
    name: Publish to npm
    needs: build-npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: npm-packages
          path: dist-npm
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Publish all packages with provenance
        run: |
          for pkg in dist-npm/*.tgz; do
            npm publish "$pkg" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: .
          pattern: act-linux-*-gnu
          merge-multiple: true
      - run: chmod +x act-linux-*
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/riscv64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/actcore/act:${{ github.ref_name }}
            ghcr.io/actcore/act:latest

name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  build-pypi:
    uses: ./.github/workflows/build-pypi.yml

  build-npm:
    needs: build
    uses: ./.github/workflows/build-npm.yml

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: actions/attest@v4
        with:
          subject-path: artifacts/act-*
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} artifacts/act-* \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  pypi-publish:
    name: Publish to PyPI
    needs: build-pypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  npm-publish:
    name: Publish to npm
    needs: build-npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: npm-packages
          path: dist-npm
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish all packages with provenance
        run: |
          for pkg in dist-npm/*.tgz; do
            npm publish "$pkg" --access public --provenance
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

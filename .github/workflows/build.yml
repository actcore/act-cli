name: Build

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: macos-x86_64
            os: macos-26-intel
            ext: ""
            dest: macos-x86_64
          - name: macos-aarch64
            os: macos-latest
            ext: ""
            dest: macos-aarch64
          - name: windows-x86_64
            os: windows-latest
            ext: .exe
            dest: windows-x86_64.exe
          - name: windows-aarch64
            os: windows-11-arm
            ext: .exe
            dest: windows-aarch64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
        working-directory: act-cli
      - run: cargo build --release
      - name: Rename binaries
        shell: bash
        run: |
          cp target/release/act${{ matrix.ext }} act-${{ matrix.dest }}
          cp target/release/act-build${{ matrix.ext }} act-build-${{ matrix.dest }}
      - uses: actions/upload-artifact@v7
        with:
          name: act-${{ matrix.dest }}
          path: act-${{ matrix.dest }}
      - uses: actions/upload-artifact@v7
        with:
          name: act-build-${{ matrix.dest }}
          path: act-build-${{ matrix.dest }}

  zigbuild:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-x86_64-gnu
            target: x86_64-unknown-linux-gnu
          - name: linux-aarch64-gnu
            target: aarch64-unknown-linux-gnu
          - name: linux-riscv64-gnu
            target: riscv64gc-unknown-linux-gnu
          - name: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
          - name: linux-aarch64-musl
            target: aarch64-unknown-linux-musl
          - name: linux-riscv64-musl
            target: riscv64gc-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          targets: ${{ matrix.target }}
          bins: wit-deps-cli, cargo-zigbuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: mlugg/setup-zig@v2
      - run: wit-deps
        working-directory: act-cli
      - run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/act act-${{ matrix.name }}
          cp target/${{ matrix.target }}/release/act-build act-build-${{ matrix.name }}
      - uses: actions/upload-artifact@v7
        with:
          name: act-${{ matrix.name }}
          path: act-${{ matrix.name }}
      - uses: actions/upload-artifact@v7
        with:
          name: act-build-${{ matrix.name }}
          path: act-build-${{ matrix.name }}

name: Build

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            src: act
            dest: act-linux-x86_64
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            src: act
            dest: act-linux-aarch64
          - name: windows-x86_64
            os: windows-latest
            src: act.exe
            dest: act-windows-x86_64.exe
          - name: windows-aarch64
            os: windows-11-arm
            src: act.exe
            dest: act-windows-aarch64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Rename
        shell: bash
        run: cp target/release/${{ matrix.src }} ${{ matrix.dest }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.dest }}
          path: ${{ matrix.dest }}

  macos-universal:
    name: Build (macos-universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal
      - name: Build (aarch64)
        run: cargo build --release --target aarch64-apple-darwin
      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/act \
            target/x86_64-apple-darwin/release/act \
            -output act-macos-universal
      - uses: actions/upload-artifact@v7
        with:
          name: act-macos-universal
          path: act-macos-universal

  zigbuild:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
          - name: linux-aarch64-musl
            target: aarch64-unknown-linux-musl
          - name: linux-riscv64-gnu
            target: riscv64gc-unknown-linux-gnu
          - name: linux-riscv64-musl
            target: riscv64gc-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - uses: taiki-e/install-action@cargo-zigbuild
      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Rename
        run: cp target/${{ matrix.target }}/release/act act-${{ matrix.name }}
      - uses: actions/upload-artifact@v7
        with:
          name: act-${{ matrix.name }}
          path: act-${{ matrix.name }}

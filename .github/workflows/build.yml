name: Build

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            src: act
            dest: act-linux-x86_64
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            src: act
            dest: act-linux-aarch64
          - name: macos-x86_64
            os: macos-13
            src: act
            dest: act-macos-x86_64
          - name: macos-aarch64
            os: macos-latest
            src: act
            dest: act-macos-aarch64
          - name: windows-x86_64
            os: windows-latest
            src: act.exe
            dest: act-windows-x86_64.exe
          - name: windows-aarch64
            os: windows-11-arm
            src: act.exe
            dest: act-windows-aarch64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - run: cargo build --release
      - name: Rename
        shell: bash
        run: cp target/release/${{ matrix.src }} ${{ matrix.dest }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.dest }}
          path: ${{ matrix.dest }}

  zigbuild:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
          - name: linux-aarch64-musl
            target: aarch64-unknown-linux-musl
          - name: linux-riscv64-gnu
            target: riscv64gc-unknown-linux-gnu
          - name: linux-riscv64-musl
            target: riscv64gc-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          targets: ${{ matrix.target }}
          bins: wit-deps-cli, cargo-zigbuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: mlugg/setup-zig@v2
      - run: wit-deps
      - run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Rename
        run: cp target/${{ matrix.target }}/release/act act-${{ matrix.name }}
      - uses: actions/upload-artifact@v7
        with:
          name: act-${{ matrix.name }}
          path: act-${{ matrix.name }}

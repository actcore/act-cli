name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check
      - name: Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test
    needs: [check, fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test

  build:
    needs: [check, fmt]
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: act
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            artifact: act
          - name: macos-aarch64
            os: macos-latest
            artifact: act
          - name: windows-x86_64
            os: windows-latest
            artifact: act.exe
          - name: windows-aarch64
            os: windows-11-arm
            artifact: act.exe
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: act-${{ matrix.name }}
          path: target/release/${{ matrix.artifact }}

  build-cross:
    needs: [check, fmt]
    name: Build (linux-riscv64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv64gc-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: riscv64
      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
        run: cargo build --release --target riscv64gc-unknown-linux-gnu
      - uses: actions/upload-artifact@v7
        with:
          name: act-linux-riscv64
          path: target/riscv64gc-unknown-linux-gnu/release/act

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt -- --check

name: Setup ACT CLI
description: Download and install the act CLI from GitHub Releases

inputs:
  version:
    description: Version to install (e.g. "0.1.0"). Defaults to latest.
    required: false
    default: latest
  token:
    description: GitHub token for downloading release assets
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Detect platform
      id: detect
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   echo "asset=act-linux-x86_64.tar.gz" >> "$GITHUB_OUTPUT" ;;
          Linux-ARM64) echo "asset=act-linux-aarch64.tar.gz" >> "$GITHUB_OUTPUT" ;;
          macOS-ARM64) echo "asset=act-macos-aarch64.tar.gz" >> "$GITHUB_OUTPUT" ;;
          macOS-X64)   echo "asset=act-macos-x86_64.tar.gz" >> "$GITHUB_OUTPUT" ;;
          Windows-X64)   echo "asset=act-windows-x86_64.tar.gz" >> "$GITHUB_OUTPUT" ;;
          Windows-ARM64) echo "asset=act-windows-aarch64.tar.gz" >> "$GITHUB_OUTPUT" ;;
          *) echo "::error::Unsupported platform: ${{ runner.os }}-${{ runner.arch }}" && exit 1 ;;
        esac

    - name: Download and install
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        INSTALL_DIR="$HOME/.act/bin"
        mkdir -p "$INSTALL_DIR"

        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          gh release download --repo actcore/act-cli --pattern "${{ steps.detect.outputs.asset }}" --dir /tmp
        else
          gh release download "$VERSION" --repo actcore/act-cli --pattern "${{ steps.detect.outputs.asset }}" --dir /tmp
        fi

        tar xzf "/tmp/${{ steps.detect.outputs.asset }}" -C "$INSTALL_DIR"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Verify
      shell: bash
      run: act --help > /dev/null 2>&1 && echo "act CLI installed successfully"
